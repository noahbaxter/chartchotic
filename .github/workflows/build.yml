name: Build

on:
  workflow_call:
    inputs:
      version_string:
        description: 'Version string to inject (e.g., 0.9.5 or 0.9.5-dev.20260226.abc1234)'
        required: true
        type: string
      build_channel:
        description: 'Build channel (RELEASE or DEV)'
        required: false
        type: string
        default: 'RELEASE'
    secrets:
      APPLE_CERTIFICATE_APPLICATION:
        required: false
      APPLE_CERTIFICATE_INSTALLER:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_APP_PASSWORD:
        required: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Inject version into .jucer
      shell: pwsh
      run: |
        # .jucer gets base semver only (Windows RC requires numeric version)
        $base = "${{ inputs.version_string }}" -replace '-.*', ''
        $content = Get-Content "ChartPreview/ChartPreview.jucer" -Raw
        $content = $content -replace 'version="[^"]*"', "version=`"$base`""
        Set-Content "ChartPreview/ChartPreview.jucer" $content
        echo "Jucer version: $base (full: ${{ inputs.version_string }})"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3

    - name: Install JUCE
      run: |
        Invoke-WebRequest -Uri "https://github.com/juce-framework/JUCE/releases/download/8.0.0/juce-8.0.0-windows.zip" -OutFile "juce.zip"
        Expand-Archive -Path "juce.zip" -DestinationPath "C:\"

    - name: Setup REAPER SDK headers
      shell: cmd
      run: |
        mkdir third_party\reaper-sdk\sdk
        copy ".ci\reaper-headers\reaper_vst3_interfaces.h" "third_party\reaper-sdk\sdk\"

    - name: Apply JUCE patches for REAPER integration
      shell: cmd
      run: |
        cd /D C:\JUCE
        git init
        git config user.email "ci@github.com"
        git config user.name "GitHub Actions"
        git add .
        git commit -m "Initial JUCE 8.0.0"
        git apply "%GITHUB_WORKSPACE%\.ci\juce-patches\01-add-reaper-api-handler.patch" || (echo "Failed to apply patch 01" && exit /b 1)
        git apply "%GITHUB_WORKSPACE%\.ci\juce-patches\02-add-reaper-handshake.patch" || (echo "Failed to apply patch 02" && exit /b 1)

    - name: Create JUCE symlink
      shell: cmd
      run: |
        mkdir third_party
        mklink /J third_party\JUCE C:\JUCE

    - name: Cache JUCE build
      uses: actions/cache@v4
      with:
        path: |
          ChartPreview/Builds
          ChartPreview/JuceLibraryCode
        key: ${{ runner.os }}-juce-v3-${{ hashFiles('ChartPreview/ChartPreview.jucer') }}
        restore-keys: ${{ runner.os }}-juce-v3-

    - name: Generate Windows project with Projucer
      shell: cmd
      run: |
        cd ChartPreview
        C:\JUCE\Projucer.exe --resave ChartPreview.jucer

    - name: Build with MSBuild
      shell: cmd
      run: |
        cd ChartPreview
        set CL=/DCHARTPREVIEW_BUILD_CHANNEL=\"${{ inputs.build_channel }}\" /DCHARTPREVIEW_VERSION_STRING=\"${{ inputs.version_string }}\"
        msbuild "Builds/VisualStudio2022/ChartPreview_SharedCode.vcxproj" /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal || exit /b 1
        msbuild "Builds/VisualStudio2022/ChartPreview_VST3.vcxproj" /p:Configuration=Release /p:Platform=x64 /p:PostBuildEventUseInBuild=false /m /verbosity:minimal

    - name: Package Windows artifact
      shell: cmd
      run: |
        cd ChartPreview
        mkdir dist-windows
        if exist "Builds\VisualStudio2022\x64\Release\VST3\ChartPreview.dll" (
          copy "Builds\VisualStudio2022\x64\Release\VST3\ChartPreview.dll" "dist-windows\ChartPreview.vst3"
        )

    - name: Build Windows installer
      shell: cmd
      run: |
        choco install innosetup -y --no-progress
        iscc /DMyAppVersion="${{ inputs.version_string }}" /DSourceDir="%GITHUB_WORKSPACE%\ChartPreview\dist-windows" "%GITHUB_WORKSPACE%\.ci\windows-installer.iss"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChartPreview-Windows
        path: |
          ChartPreview/dist-windows/
          .ci/Output/ChartPreview-Windows-Installer.exe
        retention-days: 7

  build-macos:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Check signing secrets
      id: signing
      run: |
        if [ -n "${{ secrets.APPLE_CERTIFICATE_APPLICATION }}" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Inject version into .jucer
      run: |
        BASE_VERSION=$(echo "${{ inputs.version_string }}" | sed 's/-.*//')
        sed -i '' "s/version=\"[^\"]*\"/version=\"${BASE_VERSION}\"/" ChartPreview/ChartPreview.jucer
        echo "Jucer version: ${BASE_VERSION} (full: ${{ inputs.version_string }})"

    - name: Use latest Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install JUCE
      run: |
        curl -L "https://github.com/juce-framework/JUCE/releases/download/8.0.0/juce-8.0.0-osx.zip" -o juce.zip
        unzip juce.zip -d /tmp/
        sudo mkdir -p /Applications/JUCE
        sudo cp -r /tmp/JUCE/* /Applications/JUCE/

    - name: Setup REAPER SDK headers
      run: |
        mkdir -p third_party/reaper-sdk/sdk
        cp .ci/reaper-headers/reaper_vst3_interfaces.h third_party/reaper-sdk/sdk/

    - name: Apply JUCE patches for REAPER integration
      run: |
        cd /Applications/JUCE
        sudo git init
        sudo git config user.email "ci@github.com"
        sudo git config user.name "GitHub Actions"
        sudo git add .
        sudo git commit -m "Initial JUCE 8.0.0"
        sudo git apply "$GITHUB_WORKSPACE/.ci/juce-patches/01-add-reaper-api-handler.patch" || exit 1
        sudo git apply "$GITHUB_WORKSPACE/.ci/juce-patches/02-add-reaper-handshake.patch" || exit 1

    - name: Create JUCE symlink
      run: |
        mkdir -p third_party
        ln -s /Applications/JUCE third_party/JUCE

    - name: Cache JUCE build
      uses: actions/cache@v4
      with:
        path: |
          ChartPreview/Builds
          ChartPreview/JuceLibraryCode
        key: ${{ runner.os }}-juce-v3-${{ hashFiles('ChartPreview/ChartPreview.jucer') }}
        restore-keys: ${{ runner.os }}-juce-v3-

    - name: Generate Xcode project with Projucer
      run: |
        cd ChartPreview
        "/Applications/JUCE/Projucer.app/Contents/MacOS/Projucer" --resave "ChartPreview.jucer"

    - name: Build VST3
      run: |
        cd ChartPreview
        xcodebuild \
          -project "Builds/MacOSX/ChartPreview.xcodeproj" \
          -scheme "ChartPreview - VST3" \
          -configuration Release \
          -destination "generic/platform=macOS" \
          ARCHS="arm64 x86_64" \
          ONLY_ACTIVE_ARCH=NO \
          MACOSX_DEPLOYMENT_TARGET=10.15 \
          GCC_OPTIMIZATION_LEVEL=3 \
          GCC_PREPROCESSOR_DEFINITIONS='$GCC_PREPROCESSOR_DEFINITIONS CHARTPREVIEW_BUILD_CHANNEL=\"${{ inputs.build_channel }}\" CHARTPREVIEW_VERSION_STRING=\"${{ inputs.version_string }}\"' \
          build

    - name: Build AU
      run: |
        cd ChartPreview
        xcodebuild \
          -project "Builds/MacOSX/ChartPreview.xcodeproj" \
          -scheme "ChartPreview - AU" \
          -configuration Release \
          -destination "generic/platform=macOS" \
          ARCHS="arm64 x86_64" \
          ONLY_ACTIVE_ARCH=NO \
          MACOSX_DEPLOYMENT_TARGET=10.15 \
          GCC_OPTIMIZATION_LEVEL=3 \
          GCC_PREPROCESSOR_DEFINITIONS='$GCC_PREPROCESSOR_DEFINITIONS CHARTPREVIEW_BUILD_CHANNEL=\"${{ inputs.build_channel }}\" CHARTPREVIEW_VERSION_STRING=\"${{ inputs.version_string }}\"' \
          build

    - name: Import signing certificates
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_CERTIFICATE_INSTALLER: ${{ secrets.APPLE_CERTIFICATE_INSTALLER }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -hex 32)

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "$APPLE_CERTIFICATE_APPLICATION" | base64 --decode > $RUNNER_TEMP/app_cert.p12
        echo "$APPLE_CERTIFICATE_INSTALLER" | base64 --decode > $RUNNER_TEMP/installer_cert.p12

        security import $RUNNER_TEMP/app_cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security import $RUNNER_TEMP/installer_cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

        curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
        security import DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH"

        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

        echo "=== Available signing identities ==="
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        rm -f $RUNNER_TEMP/app_cert.p12 $RUNNER_TEMP/installer_cert.p12

    - name: Code sign plugins
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        APP_IDENTITY="Developer ID Application: Noah Baxter ($APPLE_TEAM_ID)"
        BUILD_DIR="ChartPreview/Builds/MacOSX/build/Release"

        codesign --force --deep --sign "$APP_IDENTITY" \
          --options runtime --timestamp \
          "$BUILD_DIR/ChartPreview.vst3"

        codesign --force --deep --sign "$APP_IDENTITY" \
          --options runtime --timestamp \
          "$BUILD_DIR/ChartPreview.component"

        echo "Verifying signatures..."
        codesign --verify --deep --strict "$BUILD_DIR/ChartPreview.vst3"
        codesign --verify --deep --strict "$BUILD_DIR/ChartPreview.component"

    - name: Create signed installer package
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        INSTALLER_IDENTITY="Developer ID Installer: Noah Baxter ($APPLE_TEAM_ID)"
        BUILD_DIR="ChartPreview/Builds/MacOSX/build/Release"
        VERSION="${{ inputs.version_string }}"
        PKG_DIR=$RUNNER_TEMP/pkg-root

        # VST3 component package
        mkdir -p "$PKG_DIR/vst3/Library/Audio/Plug-Ins/VST3"
        cp -R "$BUILD_DIR/ChartPreview.vst3" "$PKG_DIR/vst3/Library/Audio/Plug-Ins/VST3/"
        pkgbuild --root "$PKG_DIR/vst3" --identifier "com.dichoticstudios.chartpreview.vst3" \
          --version "$VERSION" --install-location "/" \
          "$RUNNER_TEMP/ChartPreview-VST3.pkg"

        # AU component package
        mkdir -p "$PKG_DIR/au/Library/Audio/Plug-Ins/Components"
        cp -R "$BUILD_DIR/ChartPreview.component" "$PKG_DIR/au/Library/Audio/Plug-Ins/Components/"
        pkgbuild --root "$PKG_DIR/au" --identifier "com.dichoticstudios.chartpreview.au" \
          --version "$VERSION" --install-location "/" \
          "$RUNNER_TEMP/ChartPreview-AU.pkg"

        # Combined product archive
        cat > $RUNNER_TEMP/distribution.xml << 'DISTXML'
        <?xml version="1.0" encoding="utf-8"?>
        <installer-gui-script minSpecVersion="2">
            <title>Chart Preview</title>
            <options customize="allow" require-scripts="false"/>
            <choices-outline>
                <line choice="vst3"/>
                <line choice="au"/>
            </choices-outline>
            <choice id="vst3" title="VST3 Plugin" description="Install Chart Preview VST3 to /Library/Audio/Plug-Ins/VST3">
                <pkg-ref id="com.dichoticstudios.chartpreview.vst3"/>
            </choice>
            <choice id="au" title="Audio Unit Plugin" description="Install Chart Preview AU to /Library/Audio/Plug-Ins/Components">
                <pkg-ref id="com.dichoticstudios.chartpreview.au"/>
            </choice>
            <pkg-ref id="com.dichoticstudios.chartpreview.vst3" version="0" onConclusion="none">ChartPreview-VST3.pkg</pkg-ref>
            <pkg-ref id="com.dichoticstudios.chartpreview.au" version="0" onConclusion="none">ChartPreview-AU.pkg</pkg-ref>
        </installer-gui-script>
        DISTXML

        productbuild --distribution $RUNNER_TEMP/distribution.xml \
          --package-path $RUNNER_TEMP \
          "$RUNNER_TEMP/ChartPreview-unsigned.pkg"

        productsign --sign "$INSTALLER_IDENTITY" \
          "$RUNNER_TEMP/ChartPreview-unsigned.pkg" \
          "ChartPreview/ChartPreview-macOS.pkg"

    - name: Notarize installer
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      run: |
        xcrun notarytool submit "ChartPreview/ChartPreview-macOS.pkg" \
          --apple-id "$APPLE_ID" \
          --team-id "$APPLE_TEAM_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --wait --timeout 600

        xcrun stapler staple "ChartPreview/ChartPreview-macOS.pkg"
        echo "Notarization complete"

    - name: Cleanup keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChartPreview-macOS
        path: |
          ChartPreview/ChartPreview-macOS.pkg
          ChartPreview/Builds/MacOSX/build/Release/ChartPreview.vst3
          ChartPreview/Builds/MacOSX/build/Release/ChartPreview.component
        retention-days: 7

  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Inject version into .jucer
      run: |
        BASE_VERSION=$(echo "${{ inputs.version_string }}" | sed 's/-.*//')
        sed -i "s/version=\"[^\"]*\"/version=\"${BASE_VERSION}\"/" ChartPreview/ChartPreview.jucer
        echo "Jucer version: ${BASE_VERSION} (full: ${{ inputs.version_string }})"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake git \
          libasound2-dev libcurl4-openssl-dev libfreetype6-dev \
          libgl1-mesa-dev libglu1-mesa-dev libjack-jackd2-dev \
          libwebkit2gtk-4.0-dev libx11-dev libxext-dev \
          libxinerama-dev libxrandr-dev libxss-dev libxtst-dev \
          pkg-config unzip wget zip

    - name: Install JUCE
      run: |
        wget -q -O juce.zip "https://github.com/juce-framework/JUCE/releases/download/8.0.0/juce-8.0.0-linux.zip"
        unzip -q juce.zip -d /tmp/
        sudo mkdir -p /opt/JUCE
        sudo cp -r /tmp/JUCE/* /opt/JUCE/

    - name: Setup REAPER SDK headers
      run: |
        mkdir -p third_party/reaper-sdk/sdk
        cp .ci/reaper-headers/reaper_vst3_interfaces.h third_party/reaper-sdk/sdk/

    - name: Apply JUCE patches for REAPER integration
      run: |
        cd /opt/JUCE
        sudo git init
        sudo git config user.email "ci@github.com"
        sudo git config user.name "GitHub Actions"
        sudo git add .
        sudo git commit -m "Initial JUCE 8.0.0"
        sudo git apply "$GITHUB_WORKSPACE/.ci/juce-patches/01-add-reaper-api-handler.patch" || exit 1
        sudo git apply "$GITHUB_WORKSPACE/.ci/juce-patches/02-add-reaper-handshake.patch" || exit 1

    - name: Create JUCE symlink
      run: |
        mkdir -p third_party
        ln -s /opt/JUCE third_party/JUCE

    - name: Cache JUCE build
      uses: actions/cache@v4
      with:
        path: |
          ChartPreview/Builds
          ChartPreview/JuceLibraryCode
        key: ${{ runner.os }}-juce-v3-${{ hashFiles('ChartPreview/ChartPreview.jucer') }}
        restore-keys: ${{ runner.os }}-juce-v3-

    - name: Generate Linux project with Projucer
      run: |
        cd ChartPreview
        /opt/JUCE/Projucer --resave ChartPreview.jucer

    - name: Build VST3
      run: |
        cd ChartPreview/Builds/LinuxMakefile
        make clean
        make -j$(nproc) CONFIG=Release CXXFLAGS='-DCHARTPREVIEW_BUILD_CHANNEL=\"${{ inputs.build_channel }}\" -DCHARTPREVIEW_VERSION_STRING=\"${{ inputs.version_string }}\"'

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChartPreview-Linux
        path: ChartPreview/Builds/LinuxMakefile/build/ChartPreview.vst3
        retention-days: 7
