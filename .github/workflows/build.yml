name: Build

on:
  workflow_call:
    inputs:
      version_string:
        description: 'Version string to inject (e.g., 0.9.5 or 0.9.5-dev.20260226.abc1234)'
        required: true
        type: string
      build_channel:
        description: 'Build channel (RELEASE or DEV)'
        required: false
        type: string
        default: 'RELEASE'
    secrets:
      APPLE_CERTIFICATE_APPLICATION:
        required: false
      APPLE_CERTIFICATE_INSTALLER:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_APP_PASSWORD:
        required: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive

    - name: Setup REAPER SDK headers
      shell: cmd
      run: |
        mkdir third_party\reaper-sdk\sdk
        copy ".ci\reaper-headers\reaper_vst3_interfaces.h" "third_party\reaper-sdk\sdk\"

    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DBUILD_CHANNEL="${{ inputs.build_channel }}" `
          -DVERSION_STRING="${{ inputs.version_string }}"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Package Windows artifact
      shell: cmd
      run: |
        mkdir dist-windows
        xcopy "build\ChartPreview_artefacts\Release\VST3\Chart Preview.vst3" "dist-windows\Chart Preview.vst3\" /E /I

    - name: Build Windows installer
      shell: cmd
      run: |
        choco install innosetup -y --no-progress
        iscc /DMyAppVersion="${{ inputs.version_string }}" /DSourceDir="%GITHUB_WORKSPACE%\dist-windows" "%GITHUB_WORKSPACE%\.ci\windows-installer.iss"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChartPreview-Windows
        path: |
          dist-windows/
          .ci/Output/ChartPreview-Windows-Installer.exe
        retention-days: 7

  build-macos:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive

    - name: Check signing secrets
      id: signing
      run: |
        if [ -n "${{ secrets.APPLE_CERTIFICATE_APPLICATION }}" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Use latest Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup REAPER SDK headers
      run: |
        mkdir -p third_party/reaper-sdk/sdk
        cp .ci/reaper-headers/reaper_vst3_interfaces.h third_party/reaper-sdk/sdk/

    - name: Configure CMake
      run: |
        cmake -B build -G Xcode \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
          -DBUILD_CHANNEL="${{ inputs.build_channel }}" \
          -DVERSION_STRING="${{ inputs.version_string }}"

    - name: Build VST3
      run: cmake --build build --config Release --target ChartPreview_VST3

    - name: Build AU
      run: cmake --build build --config Release --target ChartPreview_AU

    - name: Import signing certificates
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_CERTIFICATE_INSTALLER: ${{ secrets.APPLE_CERTIFICATE_INSTALLER }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -hex 32)

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "$APPLE_CERTIFICATE_APPLICATION" | base64 --decode > $RUNNER_TEMP/app_cert.p12
        echo "$APPLE_CERTIFICATE_INSTALLER" | base64 --decode > $RUNNER_TEMP/installer_cert.p12

        security import $RUNNER_TEMP/app_cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security import $RUNNER_TEMP/installer_cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

        curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
        security import DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH"

        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

        echo "=== Available signing identities ==="
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        rm -f $RUNNER_TEMP/app_cert.p12 $RUNNER_TEMP/installer_cert.p12

    - name: Code sign plugins
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        APP_IDENTITY="Developer ID Application: Noah Baxter ($APPLE_TEAM_ID)"
        BUILD_DIR="build/ChartPreview_artefacts/Release"

        codesign --force --deep --sign "$APP_IDENTITY" \
          --options runtime --timestamp \
          "$BUILD_DIR/VST3/Chart Preview.vst3"

        codesign --force --deep --sign "$APP_IDENTITY" \
          --options runtime --timestamp \
          "$BUILD_DIR/AU/Chart Preview.component"

        echo "Verifying signatures..."
        codesign --verify --deep --strict "$BUILD_DIR/VST3/Chart Preview.vst3"
        codesign --verify --deep --strict "$BUILD_DIR/AU/Chart Preview.component"

    - name: Create signed installer package
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        INSTALLER_IDENTITY="Developer ID Installer: Noah Baxter ($APPLE_TEAM_ID)"
        BUILD_DIR="build/ChartPreview_artefacts/Release"
        VERSION="${{ inputs.version_string }}"
        PKG_DIR=$RUNNER_TEMP/pkg-root

        # VST3 component package
        mkdir -p "$PKG_DIR/vst3/Library/Audio/Plug-Ins/VST3"
        cp -R "$BUILD_DIR/VST3/Chart Preview.vst3" "$PKG_DIR/vst3/Library/Audio/Plug-Ins/VST3/"
        pkgbuild --root "$PKG_DIR/vst3" --identifier "com.dichoticstudios.chartpreview.vst3" \
          --version "$VERSION" --install-location "/" \
          "$RUNNER_TEMP/ChartPreview-VST3.pkg"

        # AU component package
        mkdir -p "$PKG_DIR/au/Library/Audio/Plug-Ins/Components"
        cp -R "$BUILD_DIR/AU/Chart Preview.component" "$PKG_DIR/au/Library/Audio/Plug-Ins/Components/"
        pkgbuild --root "$PKG_DIR/au" --identifier "com.dichoticstudios.chartpreview.au" \
          --version "$VERSION" --install-location "/" \
          "$RUNNER_TEMP/ChartPreview-AU.pkg"

        # Combined product archive
        cat > $RUNNER_TEMP/distribution.xml << 'DISTXML'
        <?xml version="1.0" encoding="utf-8"?>
        <installer-gui-script minSpecVersion="2">
            <title>Chart Preview</title>
            <options customize="allow" require-scripts="false"/>
            <choices-outline>
                <line choice="vst3"/>
                <line choice="au"/>
            </choices-outline>
            <choice id="vst3" title="VST3 Plugin" description="Install Chart Preview VST3 to /Library/Audio/Plug-Ins/VST3">
                <pkg-ref id="com.dichoticstudios.chartpreview.vst3"/>
            </choice>
            <choice id="au" title="Audio Unit Plugin" description="Install Chart Preview AU to /Library/Audio/Plug-Ins/Components">
                <pkg-ref id="com.dichoticstudios.chartpreview.au"/>
            </choice>
            <pkg-ref id="com.dichoticstudios.chartpreview.vst3" version="0" onConclusion="none">ChartPreview-VST3.pkg</pkg-ref>
            <pkg-ref id="com.dichoticstudios.chartpreview.au" version="0" onConclusion="none">ChartPreview-AU.pkg</pkg-ref>
        </installer-gui-script>
        DISTXML

        productbuild --distribution $RUNNER_TEMP/distribution.xml \
          --package-path $RUNNER_TEMP \
          "$RUNNER_TEMP/ChartPreview-unsigned.pkg"

        productsign --sign "$INSTALLER_IDENTITY" \
          "$RUNNER_TEMP/ChartPreview-unsigned.pkg" \
          "ChartPreview-macOS.pkg"

    - name: Notarize installer
      if: steps.signing.outputs.available == 'true'
      env:
        APPLE_CERTIFICATE_APPLICATION: ${{ secrets.APPLE_CERTIFICATE_APPLICATION }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      run: |
        xcrun notarytool submit "ChartPreview-macOS.pkg" \
          --apple-id "$APPLE_ID" \
          --team-id "$APPLE_TEAM_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --wait --timeout 600

        xcrun stapler staple "ChartPreview-macOS.pkg"
        echo "Notarization complete"

    - name: Cleanup keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChartPreview-macOS
        path: |
          ChartPreview-macOS.pkg
          build/ChartPreview_artefacts/Release/VST3/Chart Preview.vst3
          build/ChartPreview_artefacts/Release/AU/Chart Preview.component
        retention-days: 7

  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git \
          libasound2-dev libcurl4-openssl-dev libfreetype6-dev \
          libgl1-mesa-dev libglu1-mesa-dev libgtk-3-dev libjack-jackd2-dev \
          libwebkit2gtk-4.0-dev libx11-dev libxext-dev \
          libxinerama-dev libxrandr-dev libxss-dev libxtst-dev \
          pkg-config

    - name: Setup REAPER SDK headers
      run: |
        mkdir -p third_party/reaper-sdk/sdk
        cp .ci/reaper-headers/reaper_vst3_interfaces.h third_party/reaper-sdk/sdk/

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_CHANNEL="${{ inputs.build_channel }}" \
          -DVERSION_STRING="${{ inputs.version_string }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Build unit tests
      run: |
        cmake -B tests/unit/build -S tests/unit -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build tests/unit/build --config Release --parallel

    - name: Run unit tests
      run: tests/unit/build/unit_tests_artefacts/Release/unit_tests --reporter console

    - name: Verify Linux plugin bundles
      run: |
        echo "=== Checking VST3 bundle ==="
        VST3_PATH="build/ChartPreview_artefacts/Release/VST3/Chart Preview.vst3"
        if [ -d "$VST3_PATH" ]; then
          echo "[OK] VST3 bundle exists"
          ls -la "$VST3_PATH/Contents/x86_64-linux/"
        else
          echo "[ERROR] VST3 not found"
          exit 1
        fi

        echo "=== Checking Standalone ==="
        STANDALONE_PATH="build/ChartPreview_artefacts/Release/Standalone/Chart Preview"
        if [ -f "$STANDALONE_PATH" ]; then
          echo "[OK] Standalone exists ($(stat -c%s "$STANDALONE_PATH") bytes)"
        else
          echo "[WARN] Standalone not found"
        fi

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChartPreview-Linux
        path: |
          build/ChartPreview_artefacts/Release/VST3/Chart Preview.vst3
          build/ChartPreview_artefacts/Release/Standalone/Chart Preview
        retention-days: 7
