name: Dev Release

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version_string: ${{ steps.version.outputs.version_string }}
    steps:
    - uses: actions/checkout@v4
    - name: Generate dev version string
      id: version
      run: |
        BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
        TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
        SHORT_SHA=$(git rev-parse --short HEAD)
        VERSION="${BASE_VERSION}-dev.${TIMESTAMP}.${SHORT_SHA}"
        echo "version_string=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Dev version: ${VERSION}"

  build:
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version_string: ${{ needs.version.outputs.version_string }}
      build_channel: DEV
    secrets: inherit

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: ChartPreview-Windows
        path: ./artifacts/windows/

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: ChartPreview-macOS
        path: ./artifacts/macos/

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: ChartPreview-Linux
        path: ./artifacts/linux/

    - name: Create release archives
      run: |
        mkdir -p release
        cd artifacts/windows && zip -r ../../release/ChartPreview-Windows.zip . && cd ../..
        cd artifacts/macos && zip -r ../../release/ChartPreview-macOS.zip . && cd ../..
        cd artifacts/linux && zip -r ../../release/ChartPreview-Linux.zip . && cd ../..
        ls -la release/

    - name: Delete existing dev-latest release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete dev-latest --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

    - name: Create dev-latest release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create dev-latest \
          --repo ${{ github.repository }} \
          --title "Dev Build (${{ needs.version.outputs.version_string }})" \
          --notes "Automated dev build from \`dev\` branch.

        **Version:** \`${{ needs.version.outputs.version_string }}\`
        **Commit:** ${{ github.sha }}

        > These builds are unstable and may contain bugs. Use release builds for production." \
          --prerelease \
          release/ChartPreview-Windows.zip \
          release/ChartPreview-macOS.zip \
          release/ChartPreview-Linux.zip
