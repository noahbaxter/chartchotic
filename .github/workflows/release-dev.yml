name: Dev Release

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version_string: ${{ steps.version.outputs.version_string }}
    steps:
    - uses: actions/checkout@v4
    - name: Generate dev version string
      id: version
      run: |
        BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
        TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
        SHORT_SHA=$(git rev-parse --short HEAD)
        VERSION="${BASE_VERSION}-dev.${TIMESTAMP}.${SHORT_SHA}"
        echo "version_string=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Dev version: ${VERSION}"

  build:
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version_string: ${{ needs.version.outputs.version_string }}
      build_channel: DEV
    secrets: inherit

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: Chartchotic-Windows
        path: ./artifacts/windows/

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: Chartchotic-macOS
        path: ./artifacts/macos/

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: Chartchotic-Linux
        path: ./artifacts/linux/

    - name: Create release archives
      run: |
        mkdir -p release
        cd artifacts/windows && zip -r ../../release/Chartchotic-Windows.zip . && cd ../..
        cd artifacts/macos && zip -r ../../release/Chartchotic-macOS.zip . && cd ../..
        cd artifacts/linux && zip -r ../../release/Chartchotic-Linux.zip . && cd ../..
        ls -la release/

    - name: Delete existing dev-latest release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete dev-latest --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

    - name: Create dev-latest release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create dev-latest \
          --repo ${{ github.repository }} \
          --title "Dev Build (${{ needs.version.outputs.version_string }})" \
          --notes "Automated dev build from \`dev\` branch.

        **Version:** \`${{ needs.version.outputs.version_string }}\`
        **Commit:** ${{ github.sha }}

        > These builds are unstable and may contain bugs. Use release builds for production." \
          --prerelease \
          release/Chartchotic-Windows.zip \
          release/Chartchotic-macOS.zip \
          release/Chartchotic-Linux.zip

    - name: Upload to R2 CDN
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_ENDPOINT_URL: https://ee4f7641599153d817b6bddbea5483e7.r2.cloudflarestorage.com
      run: |
        VERSION="${{ needs.version.outputs.version_string }}"
        for platform in Windows macOS Linux; do
          aws s3 cp "release/Chartchotic-${platform}.zip" "s3://vst-chartchotic/dev/${VERSION}/Chartchotic-${platform}.zip" --endpoint-url $AWS_ENDPOINT_URL --region auto
          aws s3 cp "release/Chartchotic-${platform}.zip" "s3://vst-chartchotic/dev/latest/Chartchotic-${platform}.zip" --endpoint-url $AWS_ENDPOINT_URL --region auto
        done
